                                <h2 class="text-xl font-bold text-gray-100 tracking-wide">${phase.unit}</h2>
                            </div>
                            <i data-lucide="chevron-right" id="${phaseChevronId}" class="w-6 h-6 text-gray-500 rotate-icon"></i>
                        </button>

                        <div id="${phaseContentId}" class="accordion-grid phase-content">
                            <div class="accordion-inner transition-colors duration-300 pb-4 pr-4">
                                ${daysHtml}
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = htmlContent;
            lucide.createIcons(); // Initialize icons
        }

        // Toggle Single Accordion
        function toggleAccordion(elementId, chevronId) {
            const content = document.getElementById(elementId);
            const chevron = document.getElementById(chevronId);
            
            content.classList.toggle('open');
            chevron.classList.toggle('open');
            chevron.classList.toggle('text-gray-500');
            chevron.classList.toggle('text-green-500');
        }

        // Global expand/collapse utility
        function toggleAll(action) {
            const allGrids = document.querySelectorAll('.accordion-grid');
            const allChevrons = document.querySelectorAll('.rotate-icon');

            allGrids.forEach(grid => {
                if (action === 'open') grid.classList.add('open');
                else grid.classList.remove('open');
            });

            allChevrons.forEach(chevron => {
                if (action === 'open') {
                    chevron.classList.add('open', 'text-green-500');
                    chevron.classList.remove('text-gray-500');
                } else {
                    chevron.classList.remove('open', 'text-green-500');
                    chevron.classList.add('text-gray-500');
                }
            });
        }

        // Run on load
        document.addEventListener('DOMContentLoaded', renderRoadmap);

    </script>
</body>
</html>
